services:

  postgres:

    image: pgvector/pgvector:pg16

    container_name: recipe_postgres

    restart: always

    environment:

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: admin

      POSTGRES_DB: recipe_platform

    ports:

      - "5433:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

volumes:

  postgres_data: